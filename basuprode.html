<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basuprode</title>

  <link rel="stylesheet" href="Basuprode/basuprode.css">
</head>
<body>

  <div class="overlay"></div>

  <header class="hero">

    <div class="hero-left">
      <img src="img/avatar.png" alt="Avatar" class="avatar">
    </div>

    <div class="hero-center">
      <h1>BASUPRODE</h1>
      <p>
        Mundial FIFA 2026
      </p>
    </div>

    <div class="hero-right">
      🏆
    </div>

  </header>

  <main class="contenedor">

    <section class="tabla-section">

      <h2>Tabla de posiciones</h2>

      <div class="tabla-container">
        <table id="tablaPosiciones">

          <thead>
            <tr>
              <th>#</th>
              <th>Participante</th>
              <th>G</th>
              <th>E</th>
              <th>P</th>
              <th>PTS</th>
            </tr>
          </thead>

          <tbody>

          </tbody>

        </table>
      </div>

    </section>

    <section class="partidos-section">

      <h2>Resultados oficiales</h2>

      <div id="listaPartidos" class="lista-partidos"></div>

    </section>

  </main>

  <script src="Basuprode/basuprode.js"></script>

</body>
</html>
