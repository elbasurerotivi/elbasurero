<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basuprode</title>
    <link rel="stylesheet" href="Basuprode/basuprode.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="Imagenes/icono.png" type="image/x-icon">
    <!-- Swiper CSS (solo una versión) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <meta name="description" content="El Basurero, tu canal de reacciones en YouTube. Horarios, videos y comunidad.">
    <meta name="keywords" content="El Basurero, reacciones, YouTube, directos, Twitch, México, Argentina, stream, videos, comunidad, película, series, opinión, videoreacción">
</head>
<body>

  <div class="overlay"></div>

  <header
  class="hero"
  style="
    background-image:
    linear-gradient(
      rgba(0,0,0,.15),
      rgba(0,0,0,.75)
    ),
    url('Imagenes/tabla.png');

    background-size:contain;
    background-position:center;
  "
>

    <div class="hero-center">
      <h1></h1>
      <p></p>
    </div>

    <div class="hero-right"></div>

  </header>

  <main class="contenedor">
    <section class="tabla-section">
      <h2>Tabla de posiciones</h2>
      <div class="tabla-container">

        <table id="tablaPosiciones">
          <thead>
            <tr>
              <th>#</th>
              <th>Participante</th>
              <th>🎯Participaciones</th>
              <th>✅Aciertos</th>
              <th>❌Fallos</th>
              <th>🧮Puntos</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

    </section>

    <section class="partidos-section">
      <h2>Resultados</h2>
      <div id="listaPartidos" class="lista-partidos"></div>
    </section>
  </main>
  
<!-- ====================================
MODAL HISTORIAL
==================================== -->

<div id="modalHistorial" class="modal">
  <div class="modal-contenido">
    <button id="cerrarModal">
      ✖
    </button>
    <h2 id="modalTitulo">
      Predicciones
    </h2>
    <div id="modalBody"></div>
  </div>
</div>

    <!-- ====================================
MODAL PARTIDO
==================================== -->

<div id="modalPartido" class="modal">
  <div class="modal-contenido modal-partido">
    <button id="cerrarModalPartido">
      ✖
    </button>
    <div id="contenidoPartido"></div>
  </div>
</div>

  <script src="Basuprode/basuprode.js"></script>

</body>
</html>
