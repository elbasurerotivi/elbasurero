<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Exclusivos | El Basurero</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="Imagenes/icono.png" type="image/x-icon">
</head>
<body style="display:none;">

  <div id="header"></div>

  <main class="playlist-container">

    <!-- HERO -->
    <section class="hero-section" id="heroSection">
      <div class="hero-background" id="heroBg"></div>
      <div class="hero-content">
        
        <button id="backBtn" class="back-button">Volver</button>
        <div class="hero-info">
          <img id="coverImg" src="" alt="" class="series-cover">
          <div class="series-details">
            <h1 id="seriesTitle">Cargando...</h1>
            <p id="seriesMeta"></p>
            <p id="seriesSynopsis"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- VIDEOS -->
    <section class="episodes-section">
      <h2>Videos Exclusivos en la Página</h2>
      <div class="premium-grid" id="videoList"></div>
    </section>

  </main>

  <div id="footer"></div>

  <!-- Botón Scroll to Top -->
  <button class="scroll-to-top" title="Volver arriba">↑</button>

  <script src="js/scripts.js"></script>

  <script type="module">
    import "./js/login.js";
    import { exclusivosData, videosExclusivos } from "./js/exclusivos.js";

    // Header y footer
    fetch('header.html').then(r => r.text()).then(d => {
      document.getElementById('header').innerHTML = d;
      window.initAuthButtons();
    });

    fetch('footer.html').then(r => r.text()).then(d => {
      document.getElementById('footer').innerHTML = d;
    });

    // === HERO DATA ===
    document.getElementById('heroBg').style.backgroundImage =
      `url('${exclusivosData.background}')`;

    document.getElementById('seriesTitle').textContent =
      exclusivosData.title;

    document.getElementById('coverImg').src = exclusivosData.cover;

    document.getElementById('seriesMeta').innerHTML =
      `<strong>${exclusivosData.year}</strong> • ${exclusivosData.genre}<br><em>${exclusivosData.cast}</em>`;

    document.getElementById('seriesSynopsis').textContent =
      exclusivosData.synopsis;

    document.title = `${exclusivosData.title} | El Basurero`;

    // === VIDEOS ===
    const container = document.getElementById('videoList');

    videosExclusivos.forEach(video => {
      const card = document.createElement('div');
      card.className = 'premium-card episode-card';

      card.innerHTML = `
        <a href="player.html?id=${video.id}">
          <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
          <div class="premium-info">
            <h3>${video.title}</h3>
            <p class="catDesc">${video.description}</p>
          </div>
        </a>
      `;

      container.appendChild(card);
    });

    // === BOTÓN VOLVER ===
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = "index.html";
    });


    document.body.style.display = 'block';
  </script>

</body>
</html>
