<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusivos | El Basurero</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="Imagenes/icono.png" type="image/x-icon">
</head>
<body style="display:none;">

  <div id="header"></div>

  <main class="playlist-container">

    <!-- HERO FIJO -->
    <section class="hero-section">
      <div class="hero-background" 
           style="background-image: url('images/banner-exclusivos.png');">
      </div>

      <div class="hero-content">
        <div class="hero-info">
          <div class="series-details">
            <h1>🔥 Contenido Exclusivo</h1>
            <p>Material especial disponible para toda la comunidad</p>
            <p>Detrás de escenas • Especiales • Contenido único</p>
          </div>
        </div>
      </div>
    </section>

    <!-- VIDEOS -->
    <section class="episodes-section">
      <h2>Videos Exclusivos</h2>
      <div class="premium-grid" id="videoList"></div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="js/scripts.js"></script>

  <script type="module">
    import "./js/login.js";
    import { videosPremium } from "./js/videos-premium.js";

    // Cargar header y footer
    fetch('header.html')
      .then(r => r.text())
      .then(d => {
        document.getElementById('header').innerHTML = d;
        window.initAuthButtons();
      });

    fetch('footer.html')
      .then(r => r.text())
      .then(d => document.getElementById('footer').innerHTML = d);

    // === FILTRAR SOLO EXCLUSIVOS ===
    const exclusivos = videosPremium.filter(v => v.exclusivo === true);

    const container = document.getElementById('videoList');

    exclusivos.forEach(video => {
      const card = document.createElement('div');
      card.className = 'premium-card episode-card';

      card.innerHTML = `
        <a href="player.html?id=${video.id}">
          <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
          <div class="premium-info">
            <h3>${video.title}</h3>
            <p class="catDesc">${video.description}</p>
          </div>
        </a>
      `;

      container.appendChild(card);
    });

    document.body.style.display = 'block';
  </script>

</body>
</html>
