<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidad - El Basurero</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="Imagenes/icono.png" type="image/x-icon">
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
  <meta name="description" content="El Basurero, tu canal de reacciones en YouTube. Horarios, videos y comunidad.">
  <meta name="keywords" content="El Basurero, reacciones, YouTube, directos, Twitch, México, Argentina, stream, videos, comunidad, película, series, opinión, videoreacción">
</head>

<body>
  <div id="header"></div>

  
    <div id="login"></div>

    <main class="container">
      <section class="chat-wrap">
        <h2>💬 El BasuChat</h2>
        <div class="chat-content">
          <div class="chat-main">
            <div id="community-wall" class="messages"></div>
            <form id="message-form" class="message-form">
              <textarea id="message" placeholder="Escribe tu mensaje" maxlength="500" required></textarea>
              <button type="submit" class="btn send">Enviar</button>
            </form>
          </div>
        </div>
      </section>

      <section class="community-calendar">
        <h2>🎂 Cumpleaños</h2>
        <form id="birthday-form">
          <div class="form-group">
            <input type="text" id="bday-name" placeholder="Nombre" maxlength="50" required>
          </div>
          <div class="form-group">
            <input type="date" id="bday-date" required>
          </div>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
        <div class="calendar-controls">
          <button type="button" id="prev-month">◀</button>
          <span id="month-label"></span>
          <button type="button" id="next-month">▶</button>
        </div>
        <div id="calendar"></div>
        <ul id="birthday-list"></ul>
      </section>
    </main>
