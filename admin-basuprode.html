<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>
Admin BasuProde
</title>

<link
rel="stylesheet"
href="Basuprode/admin-basuprode.css"
>

</head>

<body>

<h1>
⚽ Admin BasuProde
</h1>

<div class="panel">

  <input
    id="local"
    placeholder="Equipo local"
  >

  <input
    id="visitante"
    placeholder="Equipo visitante"
  >

  <button id="crearPartido">

    Crear Partido

  </button>

</div>
<select id="resultado">
  <option value="local">
    Gana Local
  </option>

  <option value="empate">
    Empate
  </option>

  <option value="visitante">
    Gana Visitante
  </option>
</select>

<button>
  Finalizar Partido
</button>

<div id="listaPartidos">

</div>

<script
type="module"
src="Basuprode/admin-basuprode.js"
></script>

</body>
</html>
